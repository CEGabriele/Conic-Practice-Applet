<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conic Practice Applet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=31e9e0758abd4beb88862006ea94214c"></script>
    <script src="script.js"></script>
  </head>
  <body class = "bg-light">
    <div class="container py-4">
        <h1 class = "text-center mb-4">Conic Practice</h1>
        
        <div class = "row g-4">
          <div class="col-md-7">
            <div class = "card">
              <div class="card-body">
                <div id="calculator" style="width: 100%; height: 400px;"></div>
              </div>
            </div>
          </div>
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <div id="equation" class="font-monospace mb-2"></div>
              <div id="prompt" class="mb-3"></div>
              <div id="inputs" class="mb-3"></div>
  
              <div class="d-grid gap-2">
                <button onclick="checkAnswer()" class="btn btn-primary">
                  Check Answer
                </button>
                <button onclick="newProblem()" class="btn btn-outline-secondary">
                  New Problem
                </button>
              </div>
  
              <div id="feedback" class="mt-3 text-center fw-bold"></div>
            </div>
          </div>
        </div>
      </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
